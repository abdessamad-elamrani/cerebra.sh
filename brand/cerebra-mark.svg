<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Cerebra">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1f3f"/>
      <stop offset="52%" stop-color="#12427a"/>
      <stop offset="100%" stop-color="#0b74d9"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="32%" cy="24%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cGrad" x1="10%" y1="16%" x2="90%" y2="86%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="ringShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#042047" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="944" height="944" rx="220" fill="url(#bgGrad)"/>
  <rect x="40" y="40" width="944" height="944" rx="220" fill="url(#innerGlow)"/>

  <g filter="url(#ringShadow)">
    <circle
      cx="512"
      cy="512"
      r="286"
      fill="none"
      stroke="url(#cGrad)"
      stroke-width="136"
      stroke-linecap="round"
      stroke-dasharray="1330 520"
      transform="rotate(-28 512 512)"
    />
  </g>
</svg>
